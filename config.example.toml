[app]
# For most setups, only set the credentials in the backend block you use below.
# Run mode for the service. Use "loop" for normal operation.
run_mode = "loop"
router_type = "unifi"

# How often StopLiga runs a full sync, in seconds.
interval_seconds = 300

# Exact managed route or rule name that StopLiga should control.
route_name = "StopLiga"
destination_field = "auto"
request_timeout = 15
retries = 4

# Safety limit for HTTP response size, in bytes.
max_response_bytes = 2097152
dry_run = false
invalid_entry_policy = "fail"
max_destinations = 2048
state_file = "/data/state.json"
lock_file = "/data/stopliga.lock"
log_level = "INFO"
dump_payloads_on_error = false

[feeds]
status_url = "dns://blocked.dns.hayahora.futbol"
ip_list_url = "https://raw.githubusercontent.com/r4y7s/laliga-ip-list/main/laliga_ip_list.txt"
verify_tls = true
allow_private_hosts = false
strict_consistency = true

[unifi]
# UniFi host or IP address.
host = "192.168.1.1"
port = 443

# Local UniFi API key.
api_key = "replace-me"

# UniFi site name. "default" is the normal value.
site = "default"

# Set to false only if your UniFi uses a self-signed certificate.
verify_tls = false

[omada]
# Omada Controller interface access URL from Settings > Platform Integration > Open API.
# base_url = "https://omada-controller.example"

# Omada Open API client credentials and controller/cloud ID.
# client_id = "replace-me"
# client_secret = "replace-me"
# omadac_id = "replace-me"

# Omada site name or ID.
# site = "Default"

# Route traffic through either a WAN or a VPN target.
# target_type = "vpn"
# target = "WG Main"

# Optional subset of LAN networks to use as source. Leave unset to use all LANs.
# source_networks = ["LAN", "IoT"]

# Conservative chunk size for managed IP Groups.
# group_size = 16

# Set to false only if your Omada controller uses a self-signed certificate.
# verify_tls = true

[opnsense]
# OPNsense firewall host or IP address.
# host = "192.168.1.1"

# OPNsense API key and secret.
# api_key = "replace-me"
# api_secret = "replace-me"

# Optional alias override. Defaults to a sanitized version of route_name.
# alias_name = "StopLiga"

# Set to false only if your OPNsense uses a self-signed certificate.
# verify_tls = true

[notifications]
# gotify_url = "https://gotify.example.com"
# gotify_token = "replace-me"
# gotify_priority = 5
# gotify_allow_plain_http = false
# gotify_verify_tls = true
