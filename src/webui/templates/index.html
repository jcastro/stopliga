<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StopLiga</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    header {
      max-width: 960px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
    #last-updated { font-size: 0.8rem; color: #64748b; }
    .grid {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.25rem 1.5rem;
    }
    .card-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 0.75rem;
    }
    .big-status {
      font-size: 1.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .red    { color: #f87171; }
    .green  { color: #4ade80; }
    .gray   { color: #94a3b8; }
    .yellow { color: #fbbf24; }
    .blue   { color: #60a5fa; }
    .dot {
      display: inline-block;
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green { background: #4ade80; }
    .dot-red   { background: #f87171; }
    .meta {
      font-size: 0.82rem;
      color: #94a3b8;
      margin-top: 0.4rem;
      line-height: 1.5;
    }
    .meta strong { color: #cbd5e1; }
    .ip-number { font-size: 2.75rem; font-weight: 700; color: #60a5fa; line-height: 1; }
    .warn-badge {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.78rem;
      color: #fbbf24;
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.25);
      border-radius: 0.375rem;
      padding: 0.2rem 0.5rem;
    }
    .section {
      max-width: 960px;
      margin: 1.25rem auto 0;
    }
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 0.6rem;
      padding: 0 0.25rem;
    }
    .table {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      overflow: hidden;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1.5rem;
      border-bottom: 1px solid #334155;
      font-size: 0.85rem;
      gap: 1rem;
    }
    .row:last-child { border-bottom: none; }
    .row:nth-child(odd) { background: #1a2435; }
    .row-key { color: #94a3b8; white-space: nowrap; }
    .row-val { color: #e2e8f0; font-family: monospace; text-align: right; word-break: break-all; }
    .alert {
      max-width: 960px;
      margin: 1rem auto 0;
      padding: 0.875rem 1.25rem;
      border-radius: 0.75rem;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .alert-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }
    .alert-warn {
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.3);
      color: #fde68a;
    }
    .pending-msg {
      max-width: 960px;
      margin: 5rem auto;
      text-align: center;
      color: #64748b;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>🛡️ StopLiga</h1>
    <span id="last-updated"></span>
  </header>
  <div id="root"></div>

  <script>
    function rel(iso) {
      if (!iso) return "—";
      const s = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
      if (s < 0)     return "en el futuro";
      if (s < 60)    return `hace ${s}s`;
      if (s < 3600)  return `hace ${Math.floor(s / 60)}min`;
      if (s < 86400) return `hace ${Math.floor(s / 3600)}h`;
      return `hace ${Math.floor(s / 86400)}d`;
    }

    function fmt(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleString("es-ES", { dateStyle: "short", timeStyle: "medium" });
    }

    function esc(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function render(s) {
      const root = document.getElementById("root");

      if (!s || s.status === "pending") {
        root.innerHTML = `<div class="pending-msg"><p>⏳ Esperando primera sincronización…</p></div>`;
        return;
      }

      const connected = s.status === "success" || s.status === "dry_run";
      const failures  = s.consecutive_failures || 0;
      const backends  = {
        "v2-trafficroutes":        "API Moderna (v2)",
        "legacy-rest-trafficroute": "API Legacy"
      };
      const backend = backends[s.last_backend] || s.last_backend || "—";

      let html = `<div class="grid">`;

      /* ── LaLiga status ── */
      const blocked = s.last_is_blocked;
      let blockedLabel, blockedClass;
      if (blocked === true)       { blockedLabel = "🔴 ACTIVO";     blockedClass = "red";  }
      else if (blocked === false) { blockedLabel = "🟢 INACTIVO";   blockedClass = "green"; }
      else                        { blockedLabel = "⚪ DESCONOCIDO"; blockedClass = "gray";  }

      const routeEnabled = s.desired_enabled;
      const routeState   = routeEnabled === true
        ? "habilitada"
        : routeEnabled === false
          ? "deshabilitada"
          : "desconocido";

      html += `
        <div class="card">
          <div class="card-label">Estado LaLiga</div>
          <div class="big-status ${blockedClass}">${blockedLabel}</div>
          <div class="meta">Ruta en UniFi: <strong>${routeState}</strong></div>
        </div>`;

      /* ── UniFi connection ── */
      html += `
        <div class="card">
          <div class="card-label">Conexión UniFi</div>
          <div class="big-status ${connected ? "green" : "red"}">
            <span class="dot ${connected ? "dot-green" : "dot-red"}"></span>
            ${connected ? "Conectado" : "Sin conexión"}
          </div>
          <div class="meta">Site: <strong>${esc(s.site) || "—"}</strong></div>
          <div class="meta">Ruta: <strong>${esc(s.route_name) || "—"}</strong></div>
          <div class="meta">Backend: <strong>${esc(backend)}</strong></div>
        </div>`;

      /* ── IP list ── */
      html += `
        <div class="card">
          <div class="card-label">Lista de IPs</div>
          <div class="ip-number">${s.desired_destinations != null ? s.desired_destinations : "—"}</div>
          <div class="meta">destinos activos</div>
          ${failures > 0
            ? `<div class="warn-badge">⚠️ ${failures} fallo${failures > 1 ? "s" : ""} consecutivo${failures > 1 ? "s" : ""}</div>`
            : ""}
        </div>`;

      html += `</div>`;

      /* ── Last sync table ── */
      const changedNote = s.changed
        ? (s.created
            ? " <span class='green'>(ruta creada)</span>"
            : " <span class='green'>(actualizada)</span>")
        : " <span class='gray'>(sin cambios)</span>";

      html += `
        <div class="section">
          <div class="section-label">Última sincronización</div>
          <div class="table">
            <div class="row">
              <span class="row-key">Último intento</span>
              <span class="row-val">${fmt(s.last_attempt_at)} · ${rel(s.last_attempt_at)}</span>
            </div>
            <div class="row">
              <span class="row-key">Último éxito</span>
              <span class="row-val">${fmt(s.last_success_at)} · ${rel(s.last_success_at)}</span>
            </div>
            <div class="row">
              <span class="row-key">Estado</span>
              <span class="row-val">${esc(s.status) || "—"}</span>
            </div>
            <div class="row">
              <span class="row-key">Cambios</span>
              <span class="row-val">${changedNote}</span>
            </div>
            <div class="row">
              <span class="row-key">Modo</span>
              <span class="row-val">${esc(s.run_mode) || "—"}${s.dry_run ? " (dry-run)" : ""}</span>
            </div>
          </div>
        </div>`;

      /* ── Alerts ── */
      if (s.last_error) {
        html += `<div class="alert alert-error">❌ <strong>Error:</strong> ${esc(s.last_error)}</div>`;
      }
      if (s.reconciliation_required) {
        html += `<div class="alert alert-warn">⚠️ <strong>Reconciliación requerida:</strong> Un ciclo anterior terminó en estado inconsistente. Revisa manualmente el estado en UniFi antes de continuar.</div>`;
      }
      if (s.bootstrap_source === "auto-bootstrap-device-fallback") {
        html += `<div class="alert alert-warn">⚠️ <strong>Revisión manual requerida:</strong> La ruta fue creada con un dispositivo individual como fallback. Revisa en UniFi Network que la configuración es correcta.</div>`;
      }

      root.innerHTML = html;
    }

    async function refresh() {
      try {
        const r = await fetch("/api/state");
        render(await r.json());
        document.getElementById("last-updated").textContent =
          "Actualizado: " + new Date().toLocaleTimeString("es-ES");
      } catch (e) {
        console.error("Error fetching state:", e);
      }
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
