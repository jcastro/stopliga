services:
  stopliga:
    build: .
    image: stopliga:local
    container_name: stopliga
    init: true
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    command: ["--loop"]
    volumes:
      - ./data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
