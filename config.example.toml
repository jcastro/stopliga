# StopLiga starter config file
#
# Optional. Most users can skip this file and use only .env.
# If you do use it, keep secrets in .env and non-secret settings here.

[app]
# Router to use: unifi, omada, keenetic, opnsense
backend = "unifi"

# Normal Docker use should stay in loop mode.
run_mode = "loop"

# Check interval in seconds.
interval_seconds = 300

# Name of the managed route or rule.
route_name = "StopLiga"

# Optional simple settings:
log_level = "INFO"
dry_run = false

[feeds]
status_url = "dns://blocked.dns.hayahora.futbol"
ip_list_url = "https://raw.githubusercontent.com/r4y7s/laliga-ip-list/main/laliga_ip_list.txt"
verify_tls = true

[controller]
# Use this section for UniFi or Omada.
host = "10.0.1.1"
port = 443
site = "default"
verify_tls = false

[unifi]
# Keep the API key in .env if possible.
# api_key = "replace-me"

[omada]
# Uncomment and fill these if backend = "omada".
# base_url = "https://omada-controller.example:8043"
# client_id = "replace-me"
# client_secret = "replace-me"
# omadac_id = "replace-me"
# target_type = "vpn"
# target = "WG Main"
# source_networks = ["LAN", "IoT"]
# group_size = 16
# verify_tls = true

[keenetic]
# Uncomment and fill these if backend = "keenetic".
# base_url = "http://192.168.1.1"
# username = "admin"
# password = "replace-me"
# interface = "Wireguard1"
# gateway = "10.10.10.1"
# auto = true
# reject = true

[opnsense]
# Uncomment and fill these if backend = "opnsense".
# host = "fw.example.local"
# api_key = "replace-me"
# api_secret = "replace-me"
# verify_tls = true
# alias_name = "StopLiga"

[notifications]
# Optional. Most users can ignore this section.
#
# Gotify
# gotify_url = "https://gotify.example.com"
# gotify_token = "replace-me"
#
# Telegram
# telegram_bot_token = "123456:replace-me"
# telegram_chat_id = "123456789"
# telegram_group_id = "-1001234567890"
# telegram_topic_id = 42
