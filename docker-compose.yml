services:
  stopliga:
    #image: ghcr.io/jcastro/stopliga:latest
    build: .
    container_name: stopliga
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    # Uncomment to enable the web UI (also set STOPLIGA_WEBUI_ENABLED=true in .env)
    ports:
      - "8181:8080"
    healthcheck:
      disable: true