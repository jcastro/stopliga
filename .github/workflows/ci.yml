name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install package and quality tooling
        run: python -m pip install ".[dev]"
      - name: Ruff
        run: python -m ruff check src tests
      - name: Ruff format
        run: python -m ruff format --check src tests
      - name: Mypy
        run: python -m mypy src
      - name: Pip Audit
        run: python -m pip_audit

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test tooling
        run: python -m pip install ".[dev]"
      - name: Compile
        run: python -m compileall run_stopliga.py src tests
      - name: Unit and integration tests with coverage
        run: python -m pytest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: docker build -t stopliga .
