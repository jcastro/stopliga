[app]
# For most setups, only set host and api_key below.
# Run mode for the service. Use "loop" for normal operation.
run_mode = "loop"

# Firewall backend: "unifi" (default) or "opnsense"
# firewall_backend = "unifi"

# How often StopLiga runs a full sync, in seconds.
interval_seconds = 300

# Exact UniFi policy route name that StopLiga should manage or create automatically.
route_name = "StopLiga"
destination_field = "auto"
request_timeout = 15
retries = 4

# Safety limit for HTTP response size, in bytes.
max_response_bytes = 2097152
dry_run = false
invalid_entry_policy = "fail"
max_destinations = 2048
state_file = "/data/state.json"
lock_file = "/data/stopliga.lock"
log_level = "INFO"
dump_payloads_on_error = false

[feeds]
status_url = "https://raw.githubusercontent.com/r4y7s/laliga-ip-list/main/laliga_status.json"
ip_list_url = "https://raw.githubusercontent.com/r4y7s/laliga-ip-list/main/laliga_ip_list.txt"
verify_tls = true
allow_private_hosts = false
strict_consistency = true

[unifi]
# UniFi host or IP address.
host = "192.168.1.1"
port = 443

# Local UniFi API key.
api_key = "replace-me"

# UniFi site name. "default" is the normal value.
site = "default"

# Set to false only if your UniFi uses a self-signed certificate.
verify_tls = false

[opnsense]
# Used when firewall_backend = "opnsense". Set STOPLIGA_FIREWALL_BACKEND=opnsense to activate.
# host = "192.168.1.1"
# api_key = "replace-me"
# api_secret = "replace-me"
# verify_tls = false
#
# Name of the alias StopLiga creates and keeps populated with the feed IPs.
# Defaults to route_name (from [app]) with special characters replaced by underscores.
# alias_name = "laliga_ips"

