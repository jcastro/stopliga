services:
  stopliga:
    image: bluepr0/stopliga:latest
    container_name: stopliga
    init: true
    restart: unless-stopped
    env_file:
      - .env
    environment:
      STOPLIGA_UID: 1000
      STOPLIGA_GID: 1000
    command: ["--loop"]
    volumes:
      - ./data:/data
      - ./secrets:/run/secrets:ro
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
