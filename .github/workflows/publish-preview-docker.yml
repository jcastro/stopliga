name: Publish Preview Container Image

on:
  push:
    branches:
      - "bbb/issue-3-fritzbox"
      - "bbb/issue-9-keenetic"
      - "bbb/issue-10-mikrotik"
  workflow_dispatch:
    inputs:
      preview_tag:
        description: Preview GHCR tag, for example test-fritzbox
        required: false
        type: string
      extra_tag:
        description: Optional immutable GHCR tag, for example test-fritzbox-abc1234
        required: false
        type: string

concurrency:
  group: publish-preview-${{ github.ref }}-${{ inputs.preview_tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve GHCR image
        id: image
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "value=ghcr.io/${owner}/stopliga" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build date
        id: build_date
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Read app version
        id: app_version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          print(f"value={version}")
          PY

      - name: Resolve preview tags
        id: tags
        env:
          IMAGE_NAME: ${{ steps.image.outputs.value }}
          PREVIEW_TAG: ${{ inputs.preview_tag }}
          EXTRA_TAG: ${{ inputs.extra_tag }}
        run: |
          preview="${PREVIEW_TAG}"
          if [ -z "${preview}" ]; then
            case "${GITHUB_REF_NAME}" in
              "bbb/issue-3-fritzbox") preview="test-fritzbox" ;;
              "bbb/issue-9-keenetic") preview="test-keenetic" ;;
              "bbb/issue-10-mikrotik") preview="test-mikrotik" ;;
              *)
                echo "Unsupported preview branch ${GITHUB_REF_NAME}" >&2
                exit 1
                ;;
            esac
          fi

          extra="${EXTRA_TAG}"
          if [ -z "${extra}" ]; then
            extra="${preview}-${GITHUB_SHA::7}"
          fi

          tags="${IMAGE_NAME}:${preview},${IMAGE_NAME}:${extra}"

          {
            echo "value=${tags}"
            echo "preview=${preview}"
            echo "primary=${IMAGE_NAME}:${preview}"
            echo "secondary=${IMAGE_NAME}:${extra}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push preview image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.value }}
          labels: |
            org.opencontainers.image.title=StopLiga Preview
            org.opencontainers.image.description=Preview build for router backend testing.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.app_version.outputs.value }}-${{ steps.tags.outputs.preview }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.build_date.outputs.value }}
          cache-from: type=gha,scope=preview-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=preview-${{ github.ref_name }}
          build-args: |
            VERSION=${{ steps.app_version.outputs.value }}-${{ steps.tags.outputs.preview }}
            BUILD_DATE=${{ steps.build_date.outputs.value }}
            VCS_REF=${{ github.sha }}

      - name: Print published preview details
        env:
          PRIMARY_TAG: ${{ steps.tags.outputs.primary }}
          SECONDARY_TAG: ${{ steps.tags.outputs.secondary }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          echo "Published ${PRIMARY_TAG}"
          if [ -n "${SECONDARY_TAG}" ]; then
            echo "Published ${SECONDARY_TAG}"
          fi
          echo "Digest ${DIGEST}"
