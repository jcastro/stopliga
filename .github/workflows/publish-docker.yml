name: Publish Container Image

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve GHCR image
        id: image
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "value=ghcr.io/${owner}/stopliga" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build date
        id: build_date
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Read app version
        id: app_version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          print(f"value={version}")
          PY

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.value }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=StopLiga
            org.opencontainers.image.description=Synchronize a managed router route or rule with live block status and a public IP feed.

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version || steps.app_version.outputs.value }}
            BUILD_DATE=${{ steps.build_date.outputs.value }}
            VCS_REF=${{ github.sha }}

      - name: Prepare GitHub release notes
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          IMAGE_NAME: ${{ steps.image.outputs.value }}
          IMAGE_VERSION: ${{ steps.meta.outputs.version || steps.app_version.outputs.value }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          tag="${GITHUB_REF_NAME}"
          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"

          if [ -n "$previous_tag" ]; then
            changes="$(git log --no-merges --invert-grep --grep '^release: prepare ' --format='- %s (`%h`)' "${previous_tag}..${GITHUB_SHA}")"
            compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${tag}"
          else
            changes="$(git log --no-merges --invert-grep --grep '^release: prepare ' --format='- %s (`%h`)')"
            compare_url=""
          fi

          if [ -z "$changes" ]; then
            if [ -n "$previous_tag" ]; then
              changes="$(git log --no-merges --format='- %s (`%h`)' "${previous_tag}..${GITHUB_SHA}")"
            else
              changes="$(git log --no-merges --format='- %s (`%h`)')"
            fi
          fi

          {
            echo "# ${tag}"
            echo
            echo "## Container image"
            echo
            echo "- \`${IMAGE_NAME}:${IMAGE_VERSION}\`"
            echo "- \`${IMAGE_NAME}:latest\`"
            echo "- \`${IMAGE_NAME}@${IMAGE_DIGEST}\`"
            echo
            echo "## What's changed"
            echo
            printf '%s\n' "$changes"
            if [ -n "$compare_url" ]; then
              echo
              echo "Full diff: ${compare_url}"
            fi
          } > release-notes.md

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --verify-tag \
              --title "$tag" \
              --notes-file release-notes.md
            exit 0
          fi

          gh release create "$tag" \
            --verify-tag \
            --title "$tag" \
            --notes-file release-notes.md
